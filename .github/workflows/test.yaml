name: Run Python Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  run-pytest:
    uses: George-Ogden/actions/.github/workflows/python-test.yaml@v4.1.0
    with:
      python-versions: "['3.13']"
      pytest-flags: -vv -m "not local"

  readme-check:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
